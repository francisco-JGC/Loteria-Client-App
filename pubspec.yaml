name: loteria_client_app
description: "Aplicación móvil de lotería para vendedores (Flutter + Dart)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  cupertino_icons: ^1.0.8
  dio: ^5.10.0
  equatable: ^2.1.0
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_riverpod: ^3.3.2
  fpdart: ^1.2.0
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  go_router: ^17.3.0
  intl: ^0.20.3
  json_annotation: ^4.12.0
  logger: ^2.7.0
  riverpod_annotation: ^4.0.3
  shared_preferences: ^2.5.5

dev_dependencies:
  build_runner: ^2.15.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0
  mocktail: ^1.0.5
  riverpod_generator: ^4.0.4

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/games/
